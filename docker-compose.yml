services:
  postgres:
    image: postgres:16-alpine
    container_name: enastic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: enastic
      POSTGRES_PASSWORD: enastic_dev_password
      POSTGRES_DB: enastic_contrats
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enastic -d enastic_contrats"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: enastic_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@enastic.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
