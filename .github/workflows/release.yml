name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos-arm
            os: macos-14
            rust-target: aarch64-apple-darwin
            pyinstaller-suffix: aarch64-apple-darwin
            # On ne bundle que l'app (.app + .app.tar.gz pour l'updater).
            # Le .dmg est volontairement exclu : son script bundle_dmg.sh
            # échoue de façon intermittente sur les runners CI (AppleScript)
            # et il n'est pas nécessaire à la mise à jour automatique.
            tauri-args: "--target aarch64-apple-darwin --bundles app"
          - name: windows
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            pyinstaller-suffix: x86_64-pc-windows-msvc
            tauri-args: ""

    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/src-tauri -> target"
          # Ne sauvegarder le cache que sur la branche main : les builds
          # déclenchés par tag (release) se contentent de LIRE le cache.
          # Évite que l'étape « Post Cache Rust » (sauvegarde) ne fasse
          # échouer une release pour une erreur transitoire de cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build API sidecar with PyInstaller
        working-directory: api
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          pyinstaller --clean --noconfirm enastic-api.spec
          mkdir -p ../desktop/src-tauri/binaries
          # Renommer le binaire avec le suffixe de la target Rust
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            cp dist/enastic-api.exe ../desktop/src-tauri/binaries/enastic-api-${{ matrix.platform.pyinstaller-suffix }}.exe
          else
            cp dist/enastic-api ../desktop/src-tauri/binaries/enastic-api-${{ matrix.platform.pyinstaller-suffix }}
            chmod +x ../desktop/src-tauri/binaries/enastic-api-${{ matrix.platform.pyinstaller-suffix }}
          fi

      - name: Install frontend deps
        working-directory: desktop
        run: npm install --no-audit --no-fund

      - name: Build Tauri app
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Clé sans mot de passe : on définit la variable vide pour que le CLI
          # signe les artefacts updater de manière non-interactive (utile sur Windows).
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npx tauri build ${{ matrix.platform.tauri-args }}

      - name: Diagnostic — lister les bundles produits
        working-directory: desktop
        shell: bash
        run: |
          echo "=== Contenu de src-tauri/target/**/release/bundle ==="
          find src-tauri/target -path "*/release/bundle/*" -type f 2>/dev/null | sort || true
          echo "=== .sig produits ==="
          find src-tauri/target -path "*/release/*" -name "*.sig" 2>/dev/null | sort || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: enastic-${{ matrix.platform.name }}
          if-no-files-found: warn
          # Deux variantes de chemin :
          #  - macOS build avec --target  -> target/<triple>/release/bundle/...
          #  - Windows build sans --target -> target/release/bundle/...
          # Le glob target/**/ n'attrape PAS de façon fiable le cas "zéro segment"
          # (Windows), d'où l'ajout des chemins target/release/bundle/... explicites.
          path: |
            desktop/src-tauri/target/*/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/*/release/bundle/macos/*.app.tar.gz.sig
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/msi/*.msi.sig
            desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            desktop/src-tauri/target/release/bundle/nsis/*-setup.exe.sig

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate latest.json for auto-updater
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          PUBDATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}"

          echo "=== DIAGNOSTIC : tous les artefacts téléchargés ==="
          find artifacts -type f | sort
          echo "=== DIAGNOSTIC : fichiers .sig trouvés ==="
          find artifacts -name "*.sig" | sort
          echo "==============================================="

          # Lit le contenu d'un .sig (signature minisign sur une ligne)
          read_sig() {
            local f="$1"
            [ -n "$f" ] && [ -f "$f" ] && tr -d '\n' < "$f" || echo ""
          }

          # IMPORTANT : GitHub renomme les assets en remplaçant les espaces (et
          # certains caractères spéciaux) par des POINTS lors de l'upload.
          # Ex. "ENASTIC Contrats.app.tar.gz" -> "ENASTIC.Contrats.app.tar.gz".
          # L'URL de téléchargement doit donc utiliser ce nom transformé, sinon
          # l'updater obtient un 404 (espaces %20-encodés = fichier introuvable).
          gh_asset_name() { echo "$1" | sed 's/ /./g'; }

          # --- macOS arm64 : l'archive updater est *.app.tar.gz (suffixe aarch64 absent du nom) ---
          MACOS_ARM_SIG=$(find artifacts -name "*.app.tar.gz.sig" | head -1)
          MACOS_ARM_FILE=$(find artifacts -name "*.app.tar.gz" ! -name "*.sig" | head -1 | xargs -I{} basename {} 2>/dev/null || true)

          # --- Windows x64 : sur ce CLI Tauri, l'artefact updater est l'installeur
          #     NSIS lui-même (*-setup.exe) + sa signature (*-setup.exe.sig).
          #     On PRIVILÉGIE NSIS (cohérent avec l'install initiale) ; repli MSI sinon.
          WIN_X64_FILE=$(find artifacts -name "*-setup.exe" ! -name "*.sig" | head -1 | xargs -I{} basename {} 2>/dev/null || true)
          WIN_X64_SIG=$(find artifacts -name "*-setup.exe.sig" | head -1)
          if [ -z "$WIN_X64_FILE" ]; then
            WIN_X64_FILE=$(find artifacts -name "*.msi" ! -name "*.sig" | head -1 | xargs -I{} basename {} 2>/dev/null || true)
            WIN_X64_SIG=$(find artifacts -name "*.msi.sig" | head -1)
          fi

          # Construit dynamiquement les blocs de plateforme uniquement si les fichiers existent
          PLATFORMS=""
          add_platform() {
            local key="$1" file="$2" sigfile="$3"
            if [ -z "$file" ]; then
              echo "::warning::Plateforme $key ignorée — aucun fichier updater trouvé."
              return
            fi
            local sig; sig=$(read_sig "$sigfile")
            if [ -z "$sig" ]; then
              echo "::warning::Plateforme $key — signature absente ($sigfile). L'updater refusera ce paquet."
            fi
            [ -n "$PLATFORMS" ] && PLATFORMS="${PLATFORMS},"
            PLATFORMS="${PLATFORMS}
              \"${key}\": {
                \"signature\": \"${sig}\",
                \"url\": \"${BASE_URL}/$(gh_asset_name "$file")\"
              }"
          }

          add_platform "darwin-aarch64" "$MACOS_ARM_FILE" "$MACOS_ARM_SIG"
          add_platform "windows-x86_64" "$WIN_X64_FILE" "$WIN_X64_SIG"

          cat > artifacts/latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Voir les notes de version sur GitHub.",
            "pub_date": "${PUBDATE}",
            "platforms": {${PLATFORMS}
            }
          }
          EOF

          echo "=== latest.json généré ==="
          cat artifacts/latest.json

          # Échec dur si aucune plateforme n'a pu être renseignée
          if [ -z "$PLATFORMS" ]; then
            echo "::error::latest.json vide — aucun artefact updater trouvé. Vérifier createUpdaterArtifacts et la signature."
            exit 1
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
